services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: clm-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite:///./data/sql_app.db
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clm-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: always

volumes:
  backend-data:
